employees:
  source_file: worker_extract.csv
  rename:
    WorkerID: employee_id
    JoinDt: start_date
    EmpType: employment_type

pay_events:
  source_file: payrun_transactions.csv
  rename:
    WorkerID: employee_id
    PayDt: pay_date
    PayRunID: pay_run_id
    GrossPay: gross_amount
    FinalFlag: is_final_pay

leave_ledger:
  source_file: timeoff_history.csv
  rename:
    WorkerID: employee_id
    LeaveDt: event_date
    LeaveType: leave_type
    Units: units
    EventType: transaction_type

leave_snapshot:
  source_file: leave_bal_report.csv
  rename:
    WorkerID: employee_id
    Balance: balance
    LeaveType: leave_type

terminations:
  source_file: separation_register.csv
  rename:
    WorkerID: employee_id
    TermDt: termination_date
    TermReason: termination_reason
    EvidenceRef: evidence_reference