employees:
  source_file: worker_extract.csv
  rename:
    WorkerID: employee_id
    HireDt: start_date
    PayStatus: employment_status
    EmpCategory: employment_type
    StdHours: standard_hours
    FTEValue: fte
    BaseHourly: base_rate
    DeptCode: department

pay_events:
  source_file: payrun_transactions.csv
  rename:
    WorkerID: employee_id
    PaidOn: pay_date
    RunID: pay_run_id
    GrossPay: gross_amount
    OTEAmt: ote_amount
    SuperAmt: super_amount
    IsFinalPay: is_final_pay
    PayCode: pay_code

leave_ledger:
  source_file: timeoff_history.csv
  rename:
    LeaveTxnID: transaction_id
    WorkerID: employee_id
    EventTS: event_date
    LeaveCode: leave_type
    TxnType: transaction_type
    UnitsHours: units

leave_snapshot:
  source_file: leave_bal_report.csv
  rename:
    WorkerID: employee_id
    BalanceAsAt: as_of_date
    LeaveCode: leave_type
    CurrentBalanceHrs: balance

terminations:
  source_file: separation_register.csv
  rename:
    WorkerID: employee_id
    EndDate: termination_date
    SepType: termination_type
    SepReason: termination_reason
    EvidenceRef: evidence_reference