    domain: LEAVE
    severity: MEDIUM
    title: Leave recorded before request approval date
    datasets:
      primary: leave_ledger
      references:
        - leave_requests
    text:
      finding: Leave ledger events were identified with event dates earlier than the recorded approval date.
      why_it_matters: Leave recorded before approval may indicate retrospective approval practices or weak workflow timing controls.
      remediation: Review approval timing and confirm whether the leave was properly authorised before being posted to payroll.
