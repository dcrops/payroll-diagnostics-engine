  - id: LEAVE-020
    tier: 1
    domain: LEAVE
    severity: HIGH
    title: Leave taken without approved leave request
    datasets:
      primary: leave_ledger
      references:
        - leave_requests
    text:
      finding: Leave taken events were identified without a matching approved leave request.
      why_it_matters: Leave posted without an approved request weakens workflow controls and may indicate unauthorised leave processing or incomplete request records.
      remediation: Confirm whether a valid approved leave request exists for the leave event date and leave type. If not, investigate approval controls and reconcile the missing workflow evidence.
    risk_dimension:
      - governance_exposure
      - evidence_traceability
      - structural_completeness
    classification: STRUCTURAL
    viability:
      payroll_only: false
      level: extended
    data_dependencies:
      hr_data: false
      config_data: true
      evidence_data: true
      financial_data: false
    data_strength:
      payroll_signal: weak

