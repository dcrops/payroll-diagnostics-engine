    text:
      finding: Leave ledger events were recorded with zero units.
      why_it_matters: Zero-unit events may indicate ingestion errors, configuration issues or placeholder transactions that weaken ledger integrity.
      remediation: Review payroll export logic and remove or correct zero-unit leave events where they do not represent valid payroll activity.
