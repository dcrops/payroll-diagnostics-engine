  - id: LEAVE-023
    tier: 2
    domain: LEAVE
    severity: MEDIUM
    title: Combined leave and worked hours exceed daily threshold
    datasets:
      primary: leave_ledger
      references:
        - timesheets
    config:
      max_combined_units: 12.0
    text:
      finding: Combined leave units and worked hours exceeded the configured daily threshold.
      why_it_matters: Excessive combined daily hours may indicate duplicate recording, leave overlap with worked time, or incorrect units.
      remediation: Review leave entries and timesheet records for the day and confirm whether units and hours are correctly recorded.
    risk_dimension:
      - data_anomaly_sanity
      - calculation_integrity
      - governance_exposure
    classification: CONTEXTUAL
    viability:
      payroll_only: false
      level: extended
    data_dependencies:
      hr_data: false
      config_data: true
      evidence_data: true
      financial_data: false
