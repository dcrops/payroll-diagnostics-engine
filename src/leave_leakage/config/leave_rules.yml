    title: Leave and worked hours recorded on same day
    datasets:
      primary: leave_ledger
      references:
        - timesheets
    text:
      finding: Leave events were identified on days where worked hours were also recorded.
      why_it_matters: Concurrent leave and worked hours may indicate duplicate recording, timesheet issues, or payroll processing errors.
      remediation: Review the leave event and timesheet entry for the same day to confirm whether both records are valid.
    risk_dimension:
