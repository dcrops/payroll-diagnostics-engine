      references:
        - leave_ledger
    text:
      finding: Leave balances were identified for leave types that do not appear in the leave ledger dataset.
      why_it_matters: If leave types appear in balances but not in ledger records, entitlement balances may not be reconstructable.
      remediation: Verify payroll configuration and ensure ledger exports include all leave types used in balance reporting.
