    domain: LSL
    severity: HIGH
    title: LSL balance increased without supporting accrual ledger activity
    datasets:
      primary: leave_snapshot
      references:
        - leave_ledger
    config:
      leave_type: LSL
      accrual_event_types:
        - accrual
        - adjustment
        - opening_balance
      min_increase_units: 0.01
    text:
      finding: LSL balance increased between snapshots without corresponding supporting ledger activity.
      why_it_matters: Balance growth should be traceable to accruals or authorised adjustments.
      remediation: Review accrual processing, manual balance adjustments, and ledger extraction completeness.
