    domain: LSL
    severity: HIGH
    title: LSL accrual ledger activity exists but balance does not change
    datasets:
      primary: leave_snapshot
      references:
        - leave_ledger
    config:
      leave_type: LSL
      accrual_event_types:
        - accrual
        - adjustment
      balance_tolerance_units: 0.01
