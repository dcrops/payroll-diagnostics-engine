  - id: LSL-024
    tier: 2
    domain: LSL
    severity: HIGH
    title: Terminated employee retains material LSL balance at snapshot date
    datasets:
      primary: employee_master
      references:
        - leave_snapshot
        - leave_ledger
    config:
      material_balance_units: 10
      termination_grace_days: 14
      closure_event_types:
        - TAKEN
        - ADJUSTMENT
        - PAYOUT
    text:
      finding: |
        A terminated employee retains a material LSL balance in the snapshot extract
        beyond the configured grace period.
      why_it_matters: |
        When an employee has a recorded termination date but retains a material LSL balance,
        it may indicate that the leave payout has not yet been processed, that the snapshot
        extract was taken before finalisation, or that balances were not closed correctly.
      remediation: |
        Confirm whether the employee's final pay included an LSL payout or whether the
        balance is expected to remain open due to data timing or system configuration.
    risk_dimension:
      - cross_module_linkage_risk
      - exception_handling
    classification: CONTEXTUAL
    viability:
      payroll_only: partial
      level: supporting
    data_dependencies:
      hr_data: true
      config_data: true
      evidence_data: true
      financial_data: false
    data_strength:
      payroll_signal: moderate