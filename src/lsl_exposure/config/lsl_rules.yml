      finding: LSL accrual activity was recorded in the ledger but the snapshot balance did not materially change.
      why_it_matters: Recorded accruals should flow through to the reported entitlement balance unless offset by other events.
      remediation: Reconcile accrual posting logic, snapshot generation, and any offsetting leave or adjustment events.
