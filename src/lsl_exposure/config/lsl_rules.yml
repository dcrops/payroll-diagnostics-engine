  - id: LSL-020
    tier: 2
    domain: LSL
    severity: HIGH
    title: Employee exceeds LSL entitlement threshold but recorded balance is extremely low
    datasets:
      primary: leave_snapshot
      references:
        - employee_master
    config:
      leave_type: LSL
      full_entitlement_years: 10
      low_balance_threshold_units: 10
    text:
      finding: Employee appears to have lengthy service but holds an unusually low LSL balance.
      why_it_matters: This can indicate under-accrual, missing service recognition, unit conversion issues, or incomplete balance migration.
      remediation: Review service history, LSL accrual configuration, jurisdictional rules, and any legacy balance migration assumptions.
    risk_dimension:
